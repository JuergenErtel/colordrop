<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Drop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* ── Reset & Design Tokens ──────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #080c14;
            --surface:  rgba(255,255,255,.04);
            --border:   rgba(255,255,255,.10);
            --gold:     #f7c948;
            --text:     #dde5f4;
            --muted:    rgba(221,229,244,.42);
            --f-head:   'Fredoka One', cursive;
            --f-mono:   'DM Mono', monospace;
        }

        /* ── Base ───────────────────────────────────────────── */
        html, body { height: 100%; }

        body {
            background-color: var(--bg);
            /* Ambient colour blobs – give depth to the void */
            background-image:
                radial-gradient(ellipse 70% 45% at  10%  5%, rgba(90, 40,175,.22) 0%, transparent 60%),
                radial-gradient(ellipse 55% 40% at  90% 95%, rgba(28, 85,210,.16) 0%, transparent 60%);
            color: var(--text);
            font-family: var(--f-mono);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ── Game wrapper ───────────────────────────────────── */
        .wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
            width: 100%;
            max-width: 480px;
        }

        /* ── Header ─────────────────────────────────────────── */
        .header { text-align: center; }

        .title {
            font-family: var(--f-head);
            font-size: clamp(2rem, 9vw, 3.6rem);
            letter-spacing: .08em;
            line-height: 1;
            /* Three-stop gradient: gold → coral → violet */
            background: linear-gradient(130deg, #f7c948 0%, #ff7b54 45%, #c47af9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: .68rem;
            letter-spacing: .32em;
            text-transform: uppercase;
            color: var(--muted);
            margin-top: .25rem;
        }

        /* ── Canvas container ───────────────────────────────── */
        .canvas-wrap { width: 100%; display: flex; justify-content: center; }

        #c {
            display: block;
            cursor: pointer;
            touch-action: none;
            border-radius: 20px;
            /* Floating-card illusion */
            box-shadow:
                0  0 60px rgba(80,40,160,.24),
                0 24px 48px rgba(0,0,0,.58);
        }

        /* ── Controls strip ─────────────────────────────────── */
        .controls {
            display: flex;
            align-items: center;
            gap: .875rem;
        }

        .btn {
            font-family: var(--f-mono);
            font-size: .72rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: .5rem 1.1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            color: var(--text);
            cursor: pointer;
            transition: background .15s, border-color .15s, transform .1s;
        }
        .btn:hover  { background: rgba(255,255,255,.09); border-color: rgba(255,255,255,.22); }
        .btn:active { transform: scale(.95); }

        /* Move counter pill */
        .moves-pill {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            padding: .35rem 1rem;
            border: 1px solid var(--border);
            border-radius: 100px;
            min-width: 72px;
        }
        .moves-n {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--gold);
            line-height: 1.1;
        }
        .moves-l {
            font-size: .58rem;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* ── Win overlay ────────────────────────────────────── */
        .overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(8,12,20,.84);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: opacity .4s ease;
        }
        .overlay.show { opacity: 1; pointer-events: all; }

        .win-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .7rem;
            padding: 2.2rem 3rem;
            background: rgba(18,22,40,.94);
            border: 1px solid rgba(255,255,255,.11);
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,.55);
        }

        .win-icon  { font-size: 2.8rem; line-height: 1; }

        .win-title {
            font-family: var(--f-head);
            font-size: 3rem;
            background: linear-gradient(130deg, #f7c948, #ff9f43);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulse 1.2s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to   { transform: scale(1.05); }
        }

        .win-sub {
            font-size: .78rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .win-sub b { color: var(--gold); font-weight: 500; }

        .win-btn {
            margin-top: .4rem;
            font-family: var(--f-mono);
            font-size: .78rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            padding: .65rem 1.8rem;
            background: rgba(247,201,72,.10);
            border: 1px solid rgba(247,201,72,.38);
            border-radius: 100px;
            color: var(--gold);
            cursor: pointer;
            transition: background .15s, border-color .15s;
        }
        .win-btn:hover { background: rgba(247,201,72,.20); border-color: rgba(247,201,72,.65); }
    </style>
</head>

<body>
    <div class="wrap">
        <header class="header">
            <h1 class="title">Color Drop</h1>
            <p class="tagline">sort · stack · solve</p>
        </header>

        <div class="canvas-wrap">
            <canvas id="c"></canvas>
        </div>

        <div class="controls">
            <button class="btn" id="undoBtn">↩ Undo</button>
            <div class="moves-pill">
                <span class="moves-n" id="moveCount">0</span>
                <span class="moves-l">moves</span>
            </div>
            <button class="btn" id="resetBtn">↺ Reset</button>
        </div>
    </div>

    <!-- Win screen -->
    <div class="overlay" id="overlay">
        <div class="win-card">
            <div class="win-icon">🏆</div>
            <h2 class="win-title">Solved!</h2>
            <p class="win-sub">Completed in <b id="finalMoves">0</b> moves</p>
            <button class="win-btn" id="playAgain">Play Again</button>
        </div>
    </div>

    <script>
    'use strict';

/* ═══════════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════════ */

const CW = 420, CH = 520;            // canvas logical size

const TUBE_W   = 68;                 // tube outer width
const TUBE_H   = 240;                // tube outer height
const TUBE_BOT = 440;                // y of tube bottom edge
const TUBE_TOP = TUBE_BOT - TUBE_H; // = 200

const BALL_R   = 26;                 // ball radius
const BALL_D   = BALL_R * 2;         // diameter = 52
const BALL_GAP = 3;                  // gap between stacked balls
const BALL_PAD = 10;                 // gap from tube bottom to lowest ball centre

const FLOAT_Y_BASE = 118;            // hovering ball baseline y

const DUR_LIFT   = 220;              // ms – selection lift animation
const DUR_ARC    = 380;              // ms – parabolic arc
const DUR_BOUNCE = 480;              // ms – landing bounce
const MAX_PARTS  = 350;              // particle cap

/* ═══════════════════════════════════════════════════════════
   COLOUR PALETTE  (neon, 3 shades each)
═══════════════════════════════════════════════════════════ */

const PALETTE = {
    cyan:    { base:'#00e5ff', bright:'#80ffff', dark:'#003844', glow:'rgba(0,229,255,.7)'   },
    magenta: { base:'#e040fb', bright:'#ff9fff', dark:'#450053', glow:'rgba(224,64,251,.7)'  },
    lime:    { base:'#b2ff59', bright:'#dfffaa', dark:'#2a5c00', glow:'rgba(178,255,89,.7)'  },
    yellow:  { base:'#ffe57f', bright:'#fffacc', dark:'#5c4400', glow:'rgba(255,229,127,.7)' },
    orange:  { base:'#ff7043', bright:'#ffb5a0', dark:'#5c1800', glow:'rgba(255,112,67,.7)'  },
    pink:    { base:'#f50057', bright:'#ff80a3', dark:'#5c0020', glow:'rgba(245,0,87,.7)'    },
};

/* ═══════════════════════════════════════════════════════════
   GAME STATE
═══════════════════════════════════════════════════════════ */

const G = {
    tubes:        [],    // Array<Array<string>> index 0=bottom, last=top
    selected:     -1,    // selected tube index (-1=none)
    selectedTime: -1,    // rAF timestamp when selection was made (lift anim)
    moves:        0,
    history:      [],    // undo stack of deep-copied tube arrays
    won:          false,
    flashTube:    -1,    // tube showing red flash
    flashUntil:   0,     // performance.now() timestamp when flash ends
    frameTime:    0,     // current rAF timestamp
    lastTime:     -1,    // previous rAF timestamp (delta-time)
    solvedTubes:  new Set(), // tubes already exploded (no double-trigger)
};

/* ═══════════════════════════════════════════════════════════
   ANIMATION STATE
═══════════════════════════════════════════════════════════ */

const ANIM = {
    arc:       null,         // ArcAnim | null
    bounceMap: new Map(),    // "tubeIdx-ballIdx" → BounceAnim
    particles: [],           // Particle[]
    busy:      false,        // blocks input during arc
};


/* ═══════════════════════════════════════════════════════════
   EASE FUNCTIONS
═══════════════════════════════════════════════════════════ */

function easeInOut(t)    { return t < .5 ? 2*t*t : -1+(4-2*t)*t; }
function easeOutBack(t)  {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2);
}
function easeOutBounce(t) {
    const n = 7.5625, d = 2.75;
    if (t < 1/d)     return n*t*t;
    if (t < 2/d)     return n*(t-=1.5/d)*t + 0.75;
    if (t < 2.5/d)   return n*(t-=2.25/d)*t + 0.9375;
    return n*(t-=2.625/d)*t + 0.984375;
}

/* ═══════════════════════════════════════════════════════════
   MATH / LAYOUT HELPERS
═══════════════════════════════════════════════════════════ */

/** Quadratic Bézier point at t along p0→p1→p2 */
function bezier2(t, p0, p1, p2) {
    const u = 1 - t;
    return {
        x: u*u*p0.x + 2*u*t*p1.x + t*t*p2.x,
        y: u*u*p0.y + 2*u*t*p1.y + t*t*p2.y,
    };
}

/** Centre-X of tube i — evenly distributed across CW */
function tubeCX(i) {
    const n   = G.tubes.length;
    const gap = (CW - n * TUBE_W) / (n + 1);
    return gap + i * (TUBE_W + gap) + TUBE_W / 2;
}

/** Centre-Y of ball at stack index bi (0=bottom) */
function ballCY(bi) {
    return TUBE_BOT - BALL_PAD - BALL_R - bi * (BALL_D + BALL_GAP);
}

/** Current y of the floating hover position (oscillates gently) */
function floatY(ts) {
    return FLOAT_Y_BASE + Math.sin(ts * 0.0028) * 5;
}

/** Rounded-rect path — [TL,TR,BR,BL] corner radii */
function roundRect(ctx, x, y, w, h, r) {
    const [tl, tr, br, bl] = r;
    ctx.beginPath();
    ctx.moveTo(x+tl, y);
    ctx.lineTo(x+w-tr, y);
    ctx.arcTo(x+w, y,   x+w, y+tr,   tr);
    ctx.lineTo(x+w, y+h-br);
    ctx.arcTo(x+w, y+h, x+w-br, y+h, br);
    ctx.lineTo(x+bl, y+h);
    ctx.arcTo(x,   y+h, x,   y+h-bl, bl);
    ctx.lineTo(x, y+tl);
    ctx.arcTo(x,   y,   x+tl, y,     tl);
    ctx.closePath();
}

    /* ═══════════════════════════════════════════════════════════
       LEVEL INITIALISATION
    ═══════════════════════════════════════════════════════════ */

    /**
     * Level 1:  2 colours × 4 balls each  →  2 mixed full tubes + 2 empty tubes.
     * Retries if the initial state happens to be already solved.
     */
    function initLevel() {
        const colours = ['red', 'blue'];

        // Build pool of 8 balls (4 of each colour)
        const pool = colours.flatMap(c => [c, c, c, c]);

        // Fisher-Yates shuffle
        for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
        }

        // First two tubes get the shuffled balls; last two are empty
        G.tubes    = [ pool.slice(0, 4), pool.slice(4, 8), [], [] ];
        G.selected = -1;
        G.moves    = 0;
        G.history  = [];
        G.won      = false;
        G.flashTube  = -1;
        G.flashUntil = 0;

        // Edge case: re-roll if randomly already solved (very rare)
        if (checkWin()) { initLevel(); return; }

        updateHUD();
        hideOverlay();
    }


    /* ═══════════════════════════════════════════════════════════
       GAME LOGIC
    ═══════════════════════════════════════════════════════════ */

    /**
     * Returns true if moving the top ball of tubes[from] onto tubes[to] is legal.
     *
     * Rules:
     *  - Source must be non-empty
     *  - Destination must have space (< 4 balls)
     *  - Destination must be empty  OR  its top ball matches the moving ball
     */
    function canMove(from, to) {
        if (from === to) return false;

        const src = G.tubes[from];
        const dst = G.tubes[to];

        if (src.length === 0) return false;   // nothing to move
        if (dst.length >= 4)  return false;   // destination full

        // Empty destination: always legal
        if (dst.length === 0) return true;

        // Non-empty: colours must match
        return dst[dst.length - 1] === src[src.length - 1];
    }

    /**
     * Execute a valid move from `from` to `to`.
     * Pushes a snapshot onto the undo stack before mutating state.
     */
    function doMove(from, to) {
        // Save deep copy for undo BEFORE mutation
        G.history.push(G.tubes.map(t => [...t]));

        // Move the top ball
        G.tubes[to].push(G.tubes[from].pop());
        G.moves++;

        updateHUD();

        // Check win after every move
        if (checkWin()) {
            G.won = true;
            setTimeout(showWin, 420);   // short delay feels more satisfying
        }
    }

    /** Revert the last move. */
    function undo() {
        if (!G.history.length) return;
        G.tubes    = G.history.pop();
        G.selected = -1;
        G.moves    = Math.max(0, G.moves - 1);
        G.won      = false;
        updateHUD();
        hideOverlay();
    }

    /**
     * Win condition: every tube is either
     *   (a) empty, or
     *   (b) contains exactly 4 balls of the same colour.
     */
    function checkWin() {
        return G.tubes.every(t =>
            t.length === 0 ||
            (t.length === 4 && t.every(c => c === t[0]))
        );
    }

    /** True if a tube already holds 4 matching balls (drives "solved" glow). */
    function isSolved(tube) {
        return tube.length === 4 && tube.every(c => c === tube[0]);
    }


    /* ═══════════════════════════════════════════════════════════
       INPUT HANDLING
    ═══════════════════════════════════════════════════════════ */

    /**
     * State machine for click/tap:
     *
     *  (none selected)  →  select tube  (if non-empty)
     *  (tube selected)  →  deselect     (same tube tapped again)
     *                   →  do move      (valid target)
     *                   →  switch sel   (colour mismatch, target non-empty)
     *                   →  flash red    (target is full)
     */
    function handleInput(lx, ly) {
        if (G.won) return;

        const idx = tubeAt(lx, ly);

        if (idx === -1) {
            // Tapped empty canvas area → deselect
            G.selected = -1;
            return;
        }

        if (G.selected === -1) {
            // Nothing selected: select tapped tube if non-empty
            if (G.tubes[idx].length > 0) G.selected = idx;

        } else if (idx === G.selected) {
            // Tapped already-selected tube → deselect
            G.selected = -1;

        } else if (canMove(G.selected, idx)) {
            // Valid move: execute, then clear selection
            const from = G.selected;
            G.selected = -1;
            doMove(from, idx);

        } else {
            // Invalid move
            const dst = G.tubes[idx];
            if (dst.length > 0 && dst.length < 4) {
                // Colour mismatch on a non-full tube → switch selection to it
                G.selected = idx;
            } else {
                // Destination is full → brief red flash, keep current selection
                triggerFlash(idx);
            }
        }
    }

    /** Returns the index of the tube whose hit-box contains (lx, ly), else -1. */
    function tubeAt(lx, ly) {
        for (let i = 0; i < G.tubes.length; i++) {
            const tx = tubeCX(i) - TUBE_W / 2;
            if (lx >= tx && lx <= tx + TUBE_W &&
                ly >= TUBE_TOP && ly <= TUBE_TOP + TUBE_H) return i;
        }
        return -1;
    }

    /** Schedule a 320 ms red flash on tube `idx`. */
    function triggerFlash(idx) {
        G.flashTube  = idx;
        G.flashUntil = performance.now() + 320;
    }


    /* ═══════════════════════════════════════════════════════════
       CANVAS SETUP & RESIZE
    ═══════════════════════════════════════════════════════════ */

    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');

    /**
     * Set the canvas's internal (logical) resolution and let CSS scale it
     * to fit the viewport. This way all drawing code uses fixed coordinates.
     */
    function resizeCanvas() {
        canvas.width  = CW;
        canvas.height = CH;

        const maxPx  = Math.min(window.innerWidth - 32, 480);
        const scale  = maxPx / CW;
        canvas.style.width  = maxPx + 'px';
        canvas.style.height = Math.round(CH * scale) + 'px';
    }


    /* ═══════════════════════════════════════════════════════════
       RENDER LOOP
    ═══════════════════════════════════════════════════════════ */

    function render(ts) {
        G.frameTime = ts;

        // ── Background ─────────────────────────────────────────
        // A near-black fill gives the canvas its own "card" identity
        ctx.fillStyle = '#0c1020';
        ctx.fillRect(0, 0, CW, CH);

        // ── Tubes and their balls ──────────────────────────────
        for (let i = 0; i < G.tubes.length; i++) drawTube(i);

        // ── Floating ball (drawn on top of all tubes) ──────────
        if (G.selected !== -1) {
            const tube = G.tubes[G.selected];
            if (tube.length > 0) {
                const cx   = tubeCX(G.selected);
                // Gentle sinusoidal hover — amplitude 5 px at ~0.45 Hz
                const fy   = FLOAT_Y_BASE + Math.sin(ts * 0.0028) * 5;
                drawBall(cx, fy, tube[tube.length - 1], /*floating=*/ true);
            }
        }

        requestAnimationFrame(render);
    }


    /* ═══════════════════════════════════════════════════════════
       DRAW TUBE
    ═══════════════════════════════════════════════════════════ */

    function drawTube(i) {
        const tube = G.tubes[i];
        const cx   = tubeCX(i);
        const tx   = cx - TUBE_W / 2;   // left edge x

        const sel      = G.selected === i;
        const solved   = isSolved(tube);
        const flashing = (G.flashTube === i) && (G.frameTime < G.flashUntil);

        ctx.save();

        // ── Outer glow (selection / solved / invalid flash) ──────
        if (flashing) {
            ctx.shadowColor = 'rgba(255, 50, 50, .62)';
            ctx.shadowBlur  = 34;
        } else if (sel) {
            ctx.shadowColor = 'rgba(247, 201, 72, .44)';
            ctx.shadowBlur  = 30;
        } else if (solved) {
            ctx.shadowColor = 'rgba( 80, 255, 150, .32)';
            ctx.shadowBlur  = 24;
        }

        // ── Tube body: rounded rect – square top, rounded bottom ─
        roundRect(ctx, tx, TUBE_TOP, TUBE_W, TUBE_H, [4, 4, 24, 24]);

        // Glass fill: subtle left-bright horizontal gradient
        const fill = ctx.createLinearGradient(tx, 0, tx + TUBE_W, 0);
        fill.addColorStop(0,    'rgba(255,255,255,.08)');
        fill.addColorStop(.35,  'rgba(255,255,255,.03)');
        fill.addColorStop(1,    'rgba(  0,  0,  0,.10)');
        ctx.fillStyle = fill;
        ctx.fill();

        // Border – colour varies with state
        ctx.strokeStyle = flashing ? 'rgba(255, 80, 80, .72)'
                        : sel      ? 'rgba(247,201, 72, .62)'
                        : solved   ? 'rgba( 80,255,150, .40)'
                        :             'rgba(255,255,255, .11)';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.restore();

        // ── Left-edge glass-reflection highlight ──────────────────
        ctx.save();
        // Clip so the highlight strip stays inside the tube shape
        roundRect(ctx, tx, TUBE_TOP, TUBE_W, TUBE_H, [4, 4, 24, 24]);
        ctx.clip();

        ctx.beginPath();
        ctx.rect(tx + 5, TUBE_TOP + 14, 3.5, TUBE_H - 36);

        const hi = ctx.createLinearGradient(0, TUBE_TOP + 14, 0, TUBE_TOP + TUBE_H - 36);
        hi.addColorStop(0,   'rgba(255,255,255,.24)');
        hi.addColorStop(.5,  'rgba(255,255,255,.07)');
        hi.addColorStop(1,   'rgba(255,255,255,.00)');
        ctx.fillStyle = hi;
        ctx.fill();
        ctx.restore();

        // ── Balls inside the tube ──────────────────────────────────
        // When a tube is selected its top ball floats away; skip rendering it here
        const drawCount = sel ? tube.length - 1 : tube.length;
        for (let bi = 0; bi < drawCount; bi++) {
            drawBall(cx, ballCY(bi), tube[bi], /*floating=*/ false);
        }
    }


    /* ═══════════════════════════════════════════════════════════
       DRAW BALL
    ═══════════════════════════════════════════════════════════ */

    /**
     * Renders a gem-like ball at (cx, cy) with a 3-D specular overlay.
     *
     * @param {number}  cx       – centre X
     * @param {number}  cy       – centre Y
     * @param {string}  colorId  – key in PALETTE
     * @param {boolean} floating – true → coloured glow instead of drop shadow
     */
    function drawBall(cx, cy, colorId, floating) {
        const col = PALETTE[colorId];
        if (!col) return;

        // ── 1. Drop shadow / glow ─────────────────────────────────
        ctx.save();
        if (floating) {
            ctx.shadowColor = col.glow;
            ctx.shadowBlur  = 30;
        } else {
            ctx.shadowColor   = 'rgba(0,0,0,.50)';
            ctx.shadowBlur    = 9;
            ctx.shadowOffsetY = 4;
        }

        // Base circle
        ctx.beginPath();
        ctx.arc(cx, cy, BALL_R, 0, Math.PI * 2);
        ctx.fillStyle = col.base;
        ctx.fill();
        ctx.restore();

        // ── 2. Specular overlay: radial gradient for 3-D sphere ────
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, BALL_R, 0, Math.PI * 2);

        // Highlight offset toward upper-left (mimics top-left light source)
        const specGrad = ctx.createRadialGradient(
            cx - BALL_R * .30, cy - BALL_R * .38,  1,   // inner: bright spot
            cx,                cy,                 BALL_R // outer: dark rim
        );
        specGrad.addColorStop(0,    'rgba(255,255,255,.60)');
        specGrad.addColorStop(.42,  'rgba(255,255,255,.10)');
        specGrad.addColorStop(1,    'rgba(  0,  0,  0,.20)');
        ctx.fillStyle = specGrad;
        ctx.fill();

        // Small sharp glint (pinpoint of light)
        ctx.beginPath();
        ctx.arc(
            cx - BALL_R * .28,
            cy - BALL_R * .30,
            BALL_R * .17,
            0, Math.PI * 2
        );
        ctx.fillStyle = 'rgba(255,255,255,.75)';
        ctx.fill();
        ctx.restore();
    }


    /* ═══════════════════════════════════════════════════════════
       UI HELPERS
    ═══════════════════════════════════════════════════════════ */

    function updateHUD() {
        document.getElementById('moveCount').textContent = G.moves;
    }

    function showWin() {
        document.getElementById('finalMoves').textContent = G.moves;
        document.getElementById('overlay').classList.add('show');
    }

    function hideOverlay() {
        document.getElementById('overlay').classList.remove('show');
    }


    /* ═══════════════════════════════════════════════════════════
       POINTER / TOUCH EVENTS
    ═══════════════════════════════════════════════════════════ */

    /**
     * Convert a MouseEvent or TouchEvent to logical canvas coordinates,
     * accounting for any CSS scaling applied to the canvas element.
     */
    function toCanvas(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = CW / rect.width;
        const scaleY = CH / rect.height;
        const src    = e.touches ? e.touches[0] : e;
        return {
            x: (src.clientX - rect.left) * scaleX,
            y: (src.clientY - rect.top)  * scaleY,
        };
    }

    canvas.addEventListener('click', e => {
        const p = toCanvas(e);
        handleInput(p.x, p.y);
    });

    // touchstart + preventDefault stops the 300 ms mobile tap delay
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        const p = toCanvas(e);
        handleInput(p.x, p.y);
    }, { passive: false });

    document.getElementById('undoBtn'   ).addEventListener('click', undo);
    document.getElementById('resetBtn'  ).addEventListener('click', initLevel);
    document.getElementById('playAgain' ).addEventListener('click', initLevel);

    window.addEventListener('resize', resizeCanvas);


    /* ═══════════════════════════════════════════════════════════
       BOOTSTRAP
    ═══════════════════════════════════════════════════════════ */

    resizeCanvas();   // size canvas before first paint
    initLevel();      // build level 1
    requestAnimationFrame(render);  // start game loop
    </script>
