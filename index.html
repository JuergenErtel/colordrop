<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Drop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* ── Reset & Design Tokens ──────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #080c14;
            --surface:  rgba(255,255,255,.04);
            --border:   rgba(255,255,255,.10);
            --gold:     #f7c948;
            --text:     #dde5f4;
            --muted:    rgba(221,229,244,.42);
            --f-head:   'Fredoka One', cursive;
            --f-mono:   'DM Mono', monospace;
        }

        /* ── Base ───────────────────────────────────────────── */
        html, body { height: 100%; }

        body {
            background-color: var(--bg);
            /* Ambient colour blobs – give depth to the void */
            background-image:
                radial-gradient(ellipse 70% 45% at  10%  5%, rgba(90, 40,175,.22) 0%, transparent 60%),
                radial-gradient(ellipse 55% 40% at  90% 95%, rgba(28, 85,210,.16) 0%, transparent 60%);
            color: var(--text);
            font-family: var(--f-mono);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ── Game wrapper ───────────────────────────────────── */
        .wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
            width: 100%;
            max-width: 480px;
        }

        /* ── Header ─────────────────────────────────────────── */
        .header { text-align: center; }

        .title {
            font-family: var(--f-head);
            font-size: clamp(2rem, 9vw, 3.6rem);
            letter-spacing: .08em;
            line-height: 1;
            /* Three-stop gradient: gold → coral → violet */
            background: linear-gradient(130deg, #f7c948 0%, #ff7b54 45%, #c47af9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: .68rem;
            letter-spacing: .32em;
            text-transform: uppercase;
            color: var(--muted);
            margin-top: .25rem;
        }

        /* ── Canvas container ───────────────────────────────── */
        .canvas-wrap { width: 100%; display: flex; justify-content: center; }

        /* Inner wrapper shrinks to canvas CSS width so the HUD aligns exactly */
        .canvas-inner { position: relative; display: inline-block; }

        /* HUD strip overlaid on top of the canvas */
        .hud-overlay {
            position: absolute;
            top: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: rgba(8,12,20,.55);
            backdrop-filter: blur(8px);           /* progressive enhancement — graceful in unsupported browsers */
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,.08);
            border-radius: 20px 20px 0 0;
            z-index: 10;
        }

        .hud-btn {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: rgba(255,255,255,.07);
            border: 1px solid rgba(255,255,255,.12);
            color: var(--text);
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            transition: background .15s, border-color .15s, transform .1s, opacity .2s;
        }
        .hud-btn:hover         { background: rgba(255,255,255,.13); border-color: rgba(255,255,255,.25); }
        .hud-btn:active        { transform: scale(.92); }
        .hud-btn:disabled      { opacity: .35; cursor: default; pointer-events: none; }

        .hud-level {
            font-family: var(--f-head);
            font-size: 1.1rem;
            letter-spacing: .08em;
            color: var(--gold);
        }

        #c {
            display: block;
            cursor: pointer;
            touch-action: none;
            border-radius: 20px;
            /* Floating-card illusion */
            box-shadow:
                0  0 60px rgba(80,40,160,.24),
                0 24px 48px rgba(0,0,0,.58);
        }

        /* ── Controls strip ─────────────────────────────────── */
        .controls {
            display: flex;
            align-items: center;
            gap: .875rem;
        }

        .btn {
            font-family: var(--f-mono);
            font-size: .72rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: .5rem 1.1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            color: var(--text);
            cursor: pointer;
            transition: background .15s, border-color .15s, transform .1s;
        }
        .btn:hover  { background: rgba(255,255,255,.09); border-color: rgba(255,255,255,.22); }
        .btn:active { transform: scale(.95); }

        /* Move counter pill */
        .moves-pill {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            padding: .35rem 1rem;
            border: 1px solid var(--border);
            border-radius: 100px;
            min-width: 72px;
        }
        .moves-n {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--gold);
            line-height: 1.1;
        }
        .moves-l {
            font-size: .58rem;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* ── Win overlay ────────────────────────────────────── */
        .overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(8,12,20,.84);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: opacity .4s ease;
        }
        .overlay.show { opacity: 1; pointer-events: all; }

        .win-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .7rem;
            padding: 2.2rem 3rem;
            background: rgba(18,22,40,.94);
            border: 1px solid rgba(255,255,255,.11);
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,.55);
        }

        .win-icon  { font-size: 2.8rem; line-height: 1; }

        .win-title {
            font-family: var(--f-head);
            font-size: 3rem;
            background: linear-gradient(130deg, #f7c948, #ff9f43);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulse 1.2s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to   { transform: scale(1.05); }
        }

        .win-sub {
            font-size: .78rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .win-sub b { color: var(--gold); font-weight: 500; }

        .win-actions {
            display: flex;
            gap: .75rem;
            margin-top: .4rem;
        }

        .win-btn {
            font-family: var(--f-mono);
            font-size: .78rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            padding: .65rem 1.8rem;
            background: rgba(247,201,72,.10);
            border: 1px solid rgba(247,201,72,.38);
            border-radius: 100px;
            color: var(--gold);
            cursor: pointer;
            transition: background .15s, border-color .15s;
        }
        .win-btn:hover { background: rgba(247,201,72,.20); border-color: rgba(247,201,72,.65); }
        .win-btn--secondary {
            background: rgba(255,255,255,.06);
            border-color: rgba(255,255,255,.15);
            color: var(--muted);
        }
        .win-btn--secondary:hover {
            background: rgba(255,255,255,.12);
            border-color: rgba(255,255,255,.30);
            color: var(--text);
        }
    </style>
</head>

<body>
    <div class="wrap">
        <header class="header">
            <h1 class="title">Color Drop</h1>
            <p class="tagline">sort · stack · solve</p>
        </header>

        <div class="canvas-wrap">
            <div class="canvas-inner">
                <canvas id="c"></canvas>
                <div class="hud-overlay">
                    <button class="hud-btn" id="undoBtn" aria-label="Undo">↩</button>
                    <span class="hud-level" id="levelLabel">LEVEL 1</span>
                    <button class="hud-btn" id="resetBtn" aria-label="Reset">↺</button>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="moves-pill">
                <span class="moves-n" id="moveCount">0</span>
                <span class="moves-l">moves</span>
            </div>
        </div>
    </div>

    <!-- Win screen -->
    <div class="overlay" id="overlay">
        <div class="win-card">
            <div class="win-icon">🏆</div>
            <h2 class="win-title">Solved!</h2>
            <p class="win-sub">Level <b id="finalLevel">1</b> — <b id="finalMoves">0</b> Züge</p>
            <div class="win-actions">
                <button class="win-btn" id="nextLevelBtn">Next Level →</button>
                <button class="win-btn win-btn--secondary" id="menuBtn">Menu</button>
            </div>
        </div>
    </div>

    <script>
    'use strict';

/* ═══════════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════════ */

const CW = 420, CH = 520;            // canvas logical size

const TUBE_W   = 68;                 // tube outer width
const TUBE_H   = 240;                // tube outer height
const TUBE_BOT = 440;                // y of tube bottom edge
const TUBE_TOP = TUBE_BOT - TUBE_H; // = 200

const BALL_R   = 26;                 // ball radius
const BALL_D   = BALL_R * 2;         // diameter = 52
const BALL_GAP = 3;                  // gap between stacked balls
const BALL_PAD = 10;                 // gap from tube bottom to lowest ball centre

const FLOAT_Y_BASE = 118;            // hovering ball baseline y

const DUR_LIFT   = 220;              // ms – selection lift animation
const DUR_ARC    = 380;              // ms – parabolic arc
const DUR_BOUNCE = 480;              // ms – landing bounce
const MAX_PARTS  = 350;              // particle cap

/* ═══════════════════════════════════════════════════════════
   COLOUR PALETTE  (neon, 3 shades each)
═══════════════════════════════════════════════════════════ */

const PALETTE = {
    cyan:    { base:'#00e5ff', bright:'#80ffff', dark:'#003844', glow:'rgba(0,229,255,.7)'   },
    magenta: { base:'#e040fb', bright:'#ff9fff', dark:'#450053', glow:'rgba(224,64,251,.7)'  },
    lime:    { base:'#b2ff59', bright:'#dfffaa', dark:'#2a5c00', glow:'rgba(178,255,89,.7)'  },
    yellow:  { base:'#ffe57f', bright:'#fffacc', dark:'#5c4400', glow:'rgba(255,229,127,.7)' },
    orange:  { base:'#ff7043', bright:'#ffb5a0', dark:'#5c1800', glow:'rgba(255,112,67,.7)'  },
    pink:    { base:'#f50057', bright:'#ff80a3', dark:'#5c0020', glow:'rgba(245,0,87,.7)'    },
};

/* ═══════════════════════════════════════════════════════════
   SEEDED PRNG
═══════════════════════════════════════════════════════════ */

/**
 * Mulberry32 — deterministic 32-bit PRNG seeded by level number.
 * Ensures every player gets identical puzzles for the same level.
 * @param {number} seed
 * @returns {function(): number}  Values in [0, 1)
 */
function mulberry32(seed) {
    return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

/* ═══════════════════════════════════════════════════════════
   GAME STATE
═══════════════════════════════════════════════════════════ */

const G = {
    tubes:        [],    // Array<Array<string>> index 0=bottom, last=top
    selected:     -1,    // selected tube index (-1=none)
    selectedTime: -1,    // rAF timestamp when selection was made (lift anim)
    moves:        0,
    history:      [],    // undo stack of deep-copied tube arrays
    won:          false,
    flashTube:    -1,    // tube showing red flash
    flashUntil:   0,     // rAF timestamp when flash ends
    frameTime:    0,     // current rAF timestamp
    lastTime:     -1,    // previous rAF timestamp (delta-time)
    solvedTubes:  new Set(), // tubes already exploded (no double-trigger)
};

/* ═══════════════════════════════════════════════════════════
   ANIMATION STATE
═══════════════════════════════════════════════════════════ */

const ANIM = {
    arc:       null,         // ArcAnim | null
    bounceMap: new Map(),    // "tubeIdx-ballIdx" → BounceAnim
    particles: [],           // Particle[]
    busy:      false,        // blocks input during arc
};

/* ═══════════════════════════════════════════════════════════
   LEVEL STATE
═══════════════════════════════════════════════════════════ */

const LEVEL = { current: 1 };

/**
 * Returns configuration for a given level number.
 * Five tiers with smooth colour progression; always 2 empty tubes.
 * @returns {{ colors: string[], empty: number, tier: string }}
 */
function levelConfig(n) {
    if (n <=  3) return { colors: ['cyan','magenta'],                                    empty: 2, tier: 'EASY'   };
    if (n <=  8) return { colors: ['cyan','magenta','lime'],                             empty: 2, tier: 'MEDIUM' };
    if (n <= 15) return { colors: ['cyan','magenta','lime','yellow'],                    empty: 2, tier: 'HARD'   };
    if (n <= 25) return { colors: ['cyan','magenta','lime','yellow','orange'],           empty: 2, tier: 'EXPERT' };
    return           { colors: ['cyan','magenta','lime','yellow','orange','pink'], empty: 2, tier: 'MASTER' };
}

/** Par = colours × 5. Scales fairly across all tiers. */
function parForLevel(n) {
    return levelConfig(n).colors.length * 5;
}

/**
 * Three-star rating based on move efficiency.
 * @param {number} moves  Actual moves taken
 * @param {number} par    Target move count for 3 stars
 */
function calcStars(moves, par) {
    if (moves <= par)        return 3;
    if (moves <= par * 1.5) return 2;
    return 1;
}

/**
 * Pure win-check on an arbitrary tubes array — no G side-effects.
 * Used by generateLevel to detect accidental re-solved states.
 */
function checkWinState(tubes) {
    return tubes.every(t => t.length === 0 || (t.length === 4 && t.every(c => c === t[0])));
}

/**
 * Build a level by backwards-shuffling from a solved state.
 * Guaranteed solvable because every move is a legal game move.
 *
 * @param {number} n  Level number (1-based)
 */
function generateLevel(n) {
    LEVEL.current  = n;
    const cfg      = levelConfig(n);
    const shuffleCount = Math.min(20 + n * 3, 200);   // cap to avoid long loops at high levels
    const rng          = mulberry32(n);                // deterministic: same level → same puzzle
    let tubes;
    let retries = 0;

    do {
        // 1. Start from solved state
        tubes = cfg.colors.map(c => [c, c, c, c]);
        for (let i = 0; i < cfg.empty; i++) tubes.push([]);

        // 2. Apply random valid moves to shuffle (more moves = harder)
        for (let s = 0; s < shuffleCount; s++) {
            const candidates = [];
            for (let si = 0; si < tubes.length; si++) {
                if (tubes[si].length === 0) continue;
                for (let di = 0; di < tubes.length; di++) {
                    if (di === si) continue;
                    if (tubes[di].length >= 4) continue;
                    if (tubes[di].length > 0 &&
                        tubes[di][tubes[di].length - 1] !== tubes[si][tubes[si].length - 1]) continue;
                    candidates.push({ si, di });
                }
            }
            // No legal move available; puzzle remains solvable, shuffle depth may be reduced.
            if (candidates.length === 0) continue;
            const { si, di } = candidates[Math.floor(rng() * candidates.length)];
            tubes[di].push(tubes[si].pop());
        }
    } while ((checkWinState(tubes) || tubes.some(t => t.length === 4 && t.every(c => c === t[0]))) && ++retries < 20);
    // retry if fully solved OR if any single tube is already complete (pre-solved tube = spoiled puzzle)

    // 3. Write into game state
    G.tubes        = tubes;
    G.selected     = -1;
    G.selectedTime = -1;
    G.moves        = 0;
    G.history      = [];
    G.won          = false;
    G.flashTube    = -1;
    G.flashUntil   = 0;
    G.solvedTubes  = new Set();
    ANIM.arc       = null;
    ANIM.bounceMap = new Map();
    ANIM.particles = [];
    ANIM.busy      = false;

    updateHUD();
    hideOverlay();
}

/* ═══════════════════════════════════════════════════════════
   EASE FUNCTIONS
═══════════════════════════════════════════════════════════ */

function easeInOut(t)    { return t < .5 ? 2*t*t : -1+(4-2*t)*t; }
function easeOutBack(t)  {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2);
}
function easeOutBounce(t) {
    const n = 7.5625, d = 2.75;
    if (t < 1/d)     return n*t*t;
    if (t < 2/d)     return n*(t-=1.5/d)*t + 0.75;
    if (t < 2.5/d)   return n*(t-=2.25/d)*t + 0.9375;
    return n*(t-=2.625/d)*t + 0.984375;
}

/* ═══════════════════════════════════════════════════════════
   MATH / LAYOUT HELPERS
═══════════════════════════════════════════════════════════ */

/** Quadratic Bézier point at t along p0→p1→p2 */
function bezier2(t, p0, p1, p2) {
    const u = 1 - t;
    return {
        x: u*u*p0.x + 2*u*t*p1.x + t*t*p2.x,
        y: u*u*p0.y + 2*u*t*p1.y + t*t*p2.y,
    };
}

/** Centre-X of tube i — evenly distributed across CW */
function tubeCX(i) {
    const n   = G.tubes.length;
    const gap = (CW - n * TUBE_W) / (n + 1);
    return gap + i * (TUBE_W + gap) + TUBE_W / 2;
}

/** Centre-Y of ball at stack index bi (0=bottom) */
function ballCY(bi) {
    return TUBE_BOT - BALL_PAD - BALL_R - bi * (BALL_D + BALL_GAP);
}

/** Current y of the floating hover position (oscillates gently) */
function floatY(ts) {
    return FLOAT_Y_BASE + Math.sin(ts * 0.0028) * 5;
}

/** Rounded-rect path — [TL,TR,BR,BL] corner radii */
function roundRect(ctx, x, y, w, h, r) {
    const [tl, tr, br, bl] = r;
    ctx.beginPath();
    ctx.moveTo(x+tl, y);
    ctx.lineTo(x+w-tr, y);
    ctx.arcTo(x+w, y,   x+w, y+tr,   tr);
    ctx.lineTo(x+w, y+h-br);
    ctx.arcTo(x+w, y+h, x+w-br, y+h, br);
    ctx.lineTo(x+bl, y+h);
    ctx.arcTo(x,   y+h, x,   y+h-bl, bl);
    ctx.lineTo(x, y+tl);
    ctx.arcTo(x,   y,   x+tl, y,     tl);
    ctx.closePath();
}



/* ═══════════════════════════════════════════════════════════
   GAME LOGIC
═══════════════════════════════════════════════════════════ */

/**
 * Returns true if moving the top ball of tubes[from] onto tubes[to] is legal.
 *
 * Rules:
 *  - Source must be non-empty
 *  - Destination must have space (< 4 balls)
 *  - Destination must be empty  OR  its top ball matches the moving ball
 */
function canMove(from, to) {
    if (from === to) return false;

    const src = G.tubes[from];
    const dst = G.tubes[to];

    if (src.length === 0) return false;   // nothing to move
    if (dst.length >= 4)  return false;   // destination full

    // Empty destination: always legal
    if (dst.length === 0) return true;

    // Non-empty: colours must match
    return dst[dst.length - 1] === src[src.length - 1];
}

/**
 * Execute a valid move from `from` to `to`.
 * Pushes a snapshot onto the undo stack before mutating state.
 */
function doMove(from, to) {
    // ── Undo snapshot — capped at 5 entries ──
    G.history.push(G.tubes.map(t => [...t]));
    if (G.history.length > 5) G.history.shift();

    // Capture start position BEFORE mutating (floating ball's current y)
    const startX = tubeCX(from);
    const startY = floatY(G.frameTime);

    // Mutate logical state
    const color = G.tubes[from][G.tubes[from].length - 1];
    G.tubes[from].pop();
    G.tubes[to].push(color);
    G.moves++;
    updateHUD();

    // ── Start arc animation ──
    const endX  = tubeCX(to);
    const endY  = ballCY(G.tubes[to].length - 1);
    const peakY = Math.min(startY, endY) - 90;

    ANIM.arc = {
        color,
        toTube:    to,
        p0: { x: startX, y: startY },
        p1: { x: (startX + endX) / 2, y: peakY },
        p2: { x: endX,   y: endY   },
        startTime: G.frameTime,
        duration:  DUR_ARC,
    };
    ANIM.busy = true;
}

/** Revert the last move. */
function undo() {
    if (!G.history.length || ANIM.busy) return;
    G.tubes        = G.history.pop();
    G.selected     = -1;
    G.selectedTime = -1;
    G.moves        = Math.max(0, G.moves - 1);
    G.won          = false;
    // Recalculate solved set after undo
    G.solvedTubes = new Set();
    for (let i = 0; i < G.tubes.length; i++) {
        if (isSolved(G.tubes[i])) G.solvedTubes.add(i);
    }
    updateHUD();
    hideOverlay();
}

/**
 * Win condition: every tube is either
 *   (a) empty, or
 *   (b) contains exactly 4 balls of the same colour.
 */
function checkWin() {
    return G.tubes.every(t =>
        t.length === 0 ||
        (t.length === 4 && t.every(c => c === t[0]))
    );
}

/** True if a tube already holds 4 matching balls (drives "solved" glow). */
function isSolved(tube) {
    return tube.length === 4 && tube.every(c => c === tube[0]);
}


/* ═══════════════════════════════════════════════════════════
   INPUT HANDLING
═══════════════════════════════════════════════════════════ */

/**
 * State machine for click/tap:
 *
 *  (none selected)  →  select tube  (if non-empty)
 *  (tube selected)  →  deselect     (same tube tapped again)
 *                   →  do move      (valid target)
 *                   →  switch sel   (colour mismatch, target non-empty)
 *                   →  flash red    (target is full)
 */
function handleInput(lx, ly) {
    if (G.won)      return;
    if (ANIM.busy)  return;   // block during arc animation

    const idx = tubeAt(lx, ly);

    if (idx === -1) {
        G.selected     = -1;
        G.selectedTime = -1;
        return;
    }

    if (G.selected === -1) {
        if (G.tubes[idx].length > 0) {
            G.selected     = idx;
            G.selectedTime = G.frameTime;
            playSound('select');
        }
    } else if (idx === G.selected) {
        G.selected     = -1;
        G.selectedTime = -1;
    } else if (canMove(G.selected, idx)) {
        const from     = G.selected;
        G.selected     = -1;
        G.selectedTime = -1;
        doMove(from, idx);
    } else {
        const dst = G.tubes[idx];
        if (dst.length > 0 && dst.length < 4) {
            G.selected     = idx;
            G.selectedTime = G.frameTime;
            playSound('select');
        } else {
            triggerFlash(idx);
        }
    }
}

/** Returns the index of the tube whose hit-box contains (lx, ly), else -1. */
function tubeAt(lx, ly) {
    for (let i = 0; i < G.tubes.length; i++) {
        const tx = tubeCX(i) - TUBE_W / 2;
        if (lx >= tx && lx <= tx + TUBE_W &&
            ly >= TUBE_TOP && ly <= TUBE_TOP + TUBE_H) return i;
    }
    return -1;
}

/** Schedule a 320 ms red flash on tube `idx`. */
function triggerFlash(idx) {
    G.flashTube  = idx;
    G.flashUntil = G.frameTime + 320;
    playSound('invalid');
}

/* ═══════════════════════════════════════════════════════════
   PARTICLE SYSTEM
═══════════════════════════════════════════════════════════ */

function spawnParticle(x, y, vx, vy, color, size, life, gravity) {
    if (ANIM.particles.length >= MAX_PARTS) return;
    ANIM.particles.push({ x, y, vx, vy, color, size,
                          life, maxLife: life, gravity });
}

/** Advance all particles by dt seconds; remove dead ones. */
function updateParticles(dt) {
    for (let i = ANIM.particles.length - 1; i >= 0; i--) {
        const p = ANIM.particles[i];
        p.x    += p.vx * dt;
        p.y    += p.vy * dt;
        p.vy   += p.gravity * dt;
        p.life -= dt;
        if (p.life <= 0) ANIM.particles.splice(i, 1);
    }
}

/** Draw all particles using additive blending for neon glow. */
function drawParticles() {
    if (!ANIM.particles.length) return;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const p of ANIM.particles) {
        ctx.globalAlpha = (p.life / p.maxLife) * 0.85;
        ctx.fillStyle   = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(p.size * (p.life / p.maxLife), 0.5), 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
}

/**
 * Burst of 35 particles from the centre of a completed tube.
 * Called once per tube — G.solvedTubes prevents re-triggering.
 */
function triggerTubeExplosion(tubeIdx) {
    const cx  = tubeCX(tubeIdx);
    const cy  = TUBE_TOP + TUBE_H * 0.4;
    const col = PALETTE[G.tubes[tubeIdx][0]];
    const colors = [col.base, col.bright, '#ffffff'];
    for (let i = 0; i < 35; i++) {
        const angle = Math.PI * 2 * Math.random();
        const speed = 50 + Math.random() * 100;   // px/s
        spawnParticle(
            cx + (Math.random()-.5) * 8,
            cy + (Math.random()-.5) * 8,
            Math.cos(angle) * speed,
            Math.sin(angle) * speed - 30,          // upward bias
            colors[Math.floor(Math.random() * colors.length)],
            2 + Math.random() * 3,                 // size
            0.6 + Math.random() * 0.6,             // life (s)
            220                                    // gravity px/s²
        );
    }
}

/**
 * Two waves of firework bursts across the canvas.
 * Wave 1: 7 bursts staggered by 200 ms.
 * Wave 2: starts 1000 ms later, 7 bursts staggered by 150 ms.
 */
function scheduleWinFireworks() {
    const colorKeys = Object.keys(PALETTE);
    const positions = [
        {x:CW*.15,y:CH*.25},{x:CW*.85,y:CH*.20},{x:CW*.50,y:CH*.15},
        {x:CW*.25,y:CH*.45},{x:CW*.75,y:CH*.42},{x:CW*.10,y:CH*.52},{x:CW*.90,y:CH*.55},
    ];

    function burst(cx, cy, count, minSpeed, maxSpeed) {
        for (let i = 0; i < count; i++) {
            const col   = PALETTE[colorKeys[Math.floor(Math.random()*colorKeys.length)]];
            const angle = Math.PI * 2 * Math.random();
            const speed = minSpeed + Math.random() * (maxSpeed - minSpeed);
            spawnParticle(
                cx + (Math.random()-.5)*10,
                cy + (Math.random()-.5)*10,
                Math.cos(angle) * speed,
                Math.sin(angle) * speed - 60,
                [col.base, col.bright, '#ffffff'][Math.floor(Math.random()*3)],
                2 + Math.random() * 4,
                0.8 + Math.random() * 1.0,
                180
            );
        }
    }

    // Wave 1
    positions.forEach((p, i) =>
        setTimeout(() => burst(p.x, p.y, 45, 80, 280), i * 200)
    );
    // Wave 2 (offset positions slightly for variety)
    setTimeout(() => {
        positions.forEach((p, i) =>
            setTimeout(() =>
                burst(p.x + (Math.random()-.5)*80, p.y + (Math.random()-.5)*60, 30, 60, 200),
                i * 150
            )
        );
    }, 1000);
}

/* ═══════════════════════════════════════════════════════════
   ANIMATION UPDATES
═══════════════════════════════════════════════════════════ */

/**
 * Called every frame. If arc is complete:
 *   1. Add bounce entry for the landed ball.
 *   2. Trigger tube explosion if tube is now solved.
 *   3. Clear arc + unblock input.
 *   4. Check win condition.
 */
function updateArc(ts) {
    if (!ANIM.arc) return;
    const elapsed = ts - ANIM.arc.startTime;
    if (elapsed < ANIM.arc.duration) return;

    const { toTube } = ANIM.arc;
    const ballIdx    = G.tubes[toTube].length - 1;

    // Start bounce on the landed ball
    ANIM.bounceMap.set(`${toTube}-${ballIdx}`, {
        startTime: ts,
        duration:  DUR_BOUNCE,
        amplitude: 14,
    });

    playSound('pop');     // ball has landed — fires before chime so order is: thud → reward

    // Tube explosion (once per solved tube)
    if (!G.solvedTubes.has(toTube) && isSolved(G.tubes[toTube])) {
        G.solvedTubes.add(toTube);
        triggerTubeExplosion(toTube);
        playSound('solved');
    }

    ANIM.arc  = null;
    ANIM.busy = false;
    updateHUD();   // re-enable undo button now that arc is done

    // Win check (after arc clears so overlay appears after animation)
    if (checkWin()) {
        G.won = true;
        scheduleWinFireworks();
        playSound('win');
        setTimeout(showWin, 600);
    }
}

/** Remove completed bounce entries from the map. */
function updateBounces(ts) {
    for (const [key, b] of ANIM.bounceMap) {
        if (ts - b.startTime >= b.duration) ANIM.bounceMap.delete(key);
    }
}


/* ═══════════════════════════════════════════════════════════
   CANVAS SETUP & RESIZE
═══════════════════════════════════════════════════════════ */

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

/**
 * Set the canvas's internal (logical) resolution and let CSS scale it
 * to fit the viewport. This way all drawing code uses fixed coordinates.
 */
function resizeCanvas() {
    canvas.width  = CW;
    canvas.height = CH;

    const maxPx   = Math.min(window.innerWidth - 32, 480);
    const scale   = maxPx / CW;
    canvas.style.width  = maxPx + 'px';
    canvas.style.height = Math.round(CH * scale) + 'px';
}


/* ═══════════════════════════════════════════════════════════
   RENDER LOOP
═══════════════════════════════════════════════════════════ */

function render(ts) {
    // Delta-time (seconds), capped to 50 ms to survive tab switches
    const dt = G.lastTime < 0
        ? 0.016
        : Math.min((ts - G.lastTime) / 1000, 0.05);
    G.lastTime  = ts;
    G.frameTime = ts;

    // ── Update animation state ────────────────────────────────
    updateArc(ts);
    updateBounces(ts);
    updateParticles(dt);

    // ── Draw ──────────────────────────────────────────────────
    drawBackground(ts);

    for (let i = 0; i < G.tubes.length; i++) drawTube(i, ts);

    if (ANIM.arc)                        drawArcBall(ts, dt);
    if (G.selected !== -1 && !ANIM.busy) drawFloatingBall(ts);

    drawParticles();

    requestAnimationFrame(render);
}


/* ═══════════════════════════════════════════════════════════
   DRAW: BACKGROUND
═══════════════════════════════════════════════════════════ */

function drawBackground(ts) {
    const t  = ts * 0.0002;
    const cx = CW * (0.5 + 0.15 * Math.sin(t));
    const cy = CH * (0.3  + 0.10 * Math.cos(t * 0.7));
    const r  = Math.hypot(CW, CH) * 0.65;

    const grad = ctx.createRadialGradient(cx, cy, 0, CW/2, CH/2, r);
    grad.addColorStop(0,   `hsl(${265+12*Math.sin(t*1.2)},60%,9%)`);
    grad.addColorStop(0.5, `hsl(${230+ 8*Math.cos(t)     },55%,6%)`);
    grad.addColorStop(1,   `hsl(${210+10*Math.sin(t*0.8) },50%,4%)`);

    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, CW, CH);
}

/* ═══════════════════════════════════════════════════════════
   DRAW: TUBE  (glassmorphism)
═══════════════════════════════════════════════════════════ */

function drawTube(i, ts = 0) {
    const tube      = G.tubes[i];
    const cx        = tubeCX(i);
    const tx        = cx - TUBE_W / 2;
    const sel       = G.selected === i && !ANIM.busy;
    const solved    = isSolved(tube);
    const flashing  = G.flashTube === i && G.frameTime < G.flashUntil;
    const arcDest   = ANIM.arc && ANIM.arc.toTube === i;

    ctx.save();

    // ── Outer glow ───────────────────────────────────────────
    if (flashing) {
        ctx.shadowColor = 'rgba(255,50,50,.62)';
        ctx.shadowBlur  = 34;
    } else if (sel) {
        ctx.shadowColor = 'rgba(247,201,72,.44)';
        ctx.shadowBlur  = 30;
    } else if (solved) {
        const pulse     = 0.5 + 0.5 * Math.sin(ts * 0.003);
        ctx.shadowColor = 'rgba(80,255,150,.32)';
        ctx.shadowBlur  = 15 + pulse * 15;
    }

    // ── Layer 1: dark base fill ───────────────────────────────
    roundRect(ctx, tx, TUBE_TOP, TUBE_W, TUBE_H, [5, 5, 26, 26]);
    ctx.fillStyle = 'rgba(15,20,40,0.65)';
    ctx.fill();

    // ── Layer 2: horizontal glass gradient ────────────────────
    roundRect(ctx, tx, TUBE_TOP, TUBE_W, TUBE_H, [5, 5, 26, 26]);
    const glassGrad = ctx.createLinearGradient(tx, 0, tx + TUBE_W, 0);
    glassGrad.addColorStop(0,    'rgba(255,255,255,.09)');
    glassGrad.addColorStop(0.45, 'rgba(255,255,255,.03)');
    glassGrad.addColorStop(1,    'rgba(255,255,255,.00)');
    ctx.fillStyle = glassGrad;
    ctx.fill();

    // ── Layer 3: border gradient (bright left, dim right) ─────
    roundRect(ctx, tx, TUBE_TOP, TUBE_W, TUBE_H, [5, 5, 26, 26]);
    const borderGrad = ctx.createLinearGradient(tx, 0, tx + TUBE_W, 0);
    borderGrad.addColorStop(0,   flashing ? 'rgba(255,80,80,.72)'
                                : sel     ? 'rgba(247,201,72,.62)'
                                : solved  ? 'rgba(80,255,150,.40)'
                                :            'rgba(255,255,255,.30)');
    borderGrad.addColorStop(1,   flashing ? 'rgba(255,80,80,.25)'
                                : sel     ? 'rgba(247,201,72,.20)'
                                : solved  ? 'rgba(80,255,150,.12)'
                                :            'rgba(255,255,255,.05)');
    ctx.strokeStyle = borderGrad;
    ctx.lineWidth   = 1.5;
    ctx.stroke();

    ctx.restore();

    // ── Layer 4: left-edge reflection strip ───────────────────
    ctx.save();
    roundRect(ctx, tx, TUBE_TOP, TUBE_W, TUBE_H, [5, 5, 26, 26]);
    ctx.clip();
    ctx.beginPath();
    ctx.rect(tx + 5, TUBE_TOP + 14, 3.5, TUBE_H - 36);
    const hiGrad = ctx.createLinearGradient(0, TUBE_TOP + 14, 0, TUBE_TOP + TUBE_H - 36);
    hiGrad.addColorStop(0,   'rgba(255,255,255,.24)');
    hiGrad.addColorStop(0.5, 'rgba(255,255,255,.07)');
    hiGrad.addColorStop(1,   'rgba(255,255,255,.00)');
    ctx.fillStyle = hiGrad;
    ctx.fill();
    ctx.restore();

    // ── Balls inside tube ──────────────────────────────────────
    // If arc is flying INTO this tube, skip its top ball (it's in flight)
    const renderCount = arcDest ? tube.length - 1 : tube.length;
    for (let bi = 0; bi < renderCount; bi++) {
        // Bounce offset: ball starts above and springs to rest
        const bounceKey = `${i}-${bi}`;
        const bounce    = ANIM.bounceMap.get(bounceKey);
        let yOff = 0;
        if (bounce) {
            const bt = Math.min((ts - bounce.startTime) / bounce.duration, 1);
            yOff = -bounce.amplitude * (1 - easeOutBounce(bt));
        }
        drawBall(cx, ballCY(bi) + yOff, tube[bi], false);
    }
}


/* ═══════════════════════════════════════════════════════════
   DRAW: BALL  (3-D neon sphere)
═══════════════════════════════════════════════════════════ */

/**
 * @param {boolean} floating  true → coloured glow halo instead of drop shadow
 */
function drawBall(cx, cy, colorId, floating) {
    const col = PALETTE[colorId];
    if (!col) return;

    ctx.save();

    // ── Shadow / glow ────────────────────────────────────────
    if (floating) {
        ctx.shadowColor = col.glow;
        ctx.shadowBlur  = 32;
    } else {
        ctx.shadowColor   = 'rgba(0,0,0,.55)';
        ctx.shadowBlur    = 10;
        ctx.shadowOffsetY = 4;
    }

    // ── Layer 1: 3-D radial gradient (bright centre → dark rim) ──
    ctx.beginPath();
    ctx.arc(cx, cy, BALL_R, 0, Math.PI * 2);
    const sphere = ctx.createRadialGradient(
        cx - BALL_R*.25, cy - BALL_R*.28, BALL_R*.05,   // bright spot
        cx,              cy,              BALL_R          // rim
    );
    sphere.addColorStop(0,   col.bright);
    sphere.addColorStop(0.5, col.base);
    sphere.addColorStop(1,   col.dark);
    ctx.fillStyle = sphere;
    ctx.fill();
    ctx.restore();

    ctx.save();
    // ── Layer 2: specular overlay ─────────────────────────────
    ctx.beginPath();
    ctx.arc(cx, cy, BALL_R, 0, Math.PI * 2);
    const spec = ctx.createRadialGradient(
        cx - BALL_R*.30, cy - BALL_R*.38, 1,
        cx,              cy,              BALL_R
    );
    spec.addColorStop(0,    'rgba(255,255,255,.62)');
    spec.addColorStop(0.40, 'rgba(255,255,255,.10)');
    spec.addColorStop(1,    'rgba(0,0,0,.22)');
    ctx.fillStyle = spec;
    ctx.fill();

    // ── Layer 3: sharp glint ──────────────────────────────────
    ctx.beginPath();
    ctx.arc(cx - BALL_R*.28, cy - BALL_R*.30, BALL_R*.17, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,.78)';
    ctx.fill();
    ctx.restore();
}

/* ═══════════════════════════════════════════════════════════
   DRAW: FLOATING BALL  (selected, hovering above tube)
═══════════════════════════════════════════════════════════ */

function drawFloatingBall(ts) {
    if (G.selected === -1) return;
    const tube = G.tubes[G.selected];
    if (!tube.length) return;

    const cx    = tubeCX(G.selected);
    const color = tube[tube.length - 1];

    // Lift animation: ease from resting position to float position
    const restY    = ballCY(tube.length - 1);
    const targetY  = floatY(ts);
    const elapsed  = G.selectedTime >= 0 ? ts - G.selectedTime : DUR_LIFT;
    const liftT    = Math.min(elapsed / DUR_LIFT, 1);
    const ballY    = restY + (targetY - restY) * easeOutBack(liftT);

    // Scale pulse once fully lifted
    const pulse    = liftT >= 1 ? 1 + Math.sin(ts * 0.005) * 0.04 : 1;

    ctx.save();
    ctx.translate(cx, ballY);
    ctx.scale(pulse, pulse);
    drawBall(0, 0, color, /*floating=*/ true);
    ctx.restore();
}

/* ═══════════════════════════════════════════════════════════
   DRAW: ARC BALL  (ball flying along parabolic path)
═══════════════════════════════════════════════════════════ */

function drawArcBall(ts, dt) {
    const a       = ANIM.arc;
    const elapsed = ts - a.startTime;
    const rawT    = Math.min(elapsed / a.duration, 1);
    const easedT  = easeInOut(rawT);
    const pos     = bezier2(easedT, a.p0, a.p1, a.p2);

    // Trail particle (dt-normalised probability)
    if (rawT < 0.92 && Math.random() < 0.4 * dt * 60) {
        const col = PALETTE[a.color];
        spawnParticle(
            pos.x + (Math.random()-.5)*4,
            pos.y + (Math.random()-.5)*4,
            (Math.random()-.5)*20,
            -25 - Math.random()*20,
            col.glow,
            2 + Math.random()*2,
            0.18 + Math.random()*0.08,
            60
        );
    }

    drawBall(pos.x, pos.y, a.color, /*floating=*/ true);
}


/* ═══════════════════════════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════════════════════════ */

/**
 * Sound hook — wire up audio files here when ready.
 * @param {'select'|'pop'|'invalid'|'solved'|'win'} name
 */
function playSound(name) {
    // TODO: Audio-Integration
}

function updateHUD() {
    document.getElementById('moveCount').textContent  = G.moves;
    document.getElementById('levelLabel').textContent = 'LEVEL ' + LEVEL.current;
    document.getElementById('undoBtn').disabled       = G.history.length === 0 || ANIM.busy || G.won;
    document.getElementById('resetBtn').disabled      = G.won;
}

function showWin() {
    if (!G.won) return;   // player reset before the 600 ms timer fired
    document.getElementById('finalLevel').textContent = LEVEL.current;
    document.getElementById('finalMoves').textContent = G.moves;
    document.getElementById('overlay').classList.add('show');
}

function hideOverlay() {
    document.getElementById('overlay').classList.remove('show');
}


/* ═══════════════════════════════════════════════════════════
   POINTER / TOUCH EVENTS
═══════════════════════════════════════════════════════════ */

/**
 * Convert a MouseEvent or TouchEvent to logical canvas coordinates,
 * accounting for any CSS scaling applied to the canvas element.
 */
function toCanvas(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = CW / rect.width;
    const scaleY = CH / rect.height;
    const src    = e.touches ? e.touches[0] : e;
    return {
        x: (src.clientX - rect.left) * scaleX,
        y: (src.clientY - rect.top)  * scaleY,
    };
}

canvas.addEventListener('click', e => {
    const p = toCanvas(e);
    handleInput(p.x, p.y);
});

// touchstart + preventDefault stops the 300 ms mobile tap delay
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const p = toCanvas(e);
    handleInput(p.x, p.y);
}, { passive: false });

document.getElementById('undoBtn' ).addEventListener('click', undo);
document.getElementById('resetBtn').addEventListener('click', () => generateLevel(LEVEL.current));
document.getElementById('nextLevelBtn').addEventListener('click', () => {
    generateLevel(LEVEL.current + 1);
});
document.getElementById('menuBtn').addEventListener('click', () => {
    LEVEL.current = 1;
    generateLevel(1);
});

window.addEventListener('resize', resizeCanvas);


/* ═══════════════════════════════════════════════════════════
   BOOTSTRAP
═══════════════════════════════════════════════════════════ */

resizeCanvas();         // size canvas before first paint
generateLevel(1);       // build level 1
requestAnimationFrame(render);  // start game loop
</script>
